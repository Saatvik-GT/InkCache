services:
  node:
    build: .
    restart: unless-stopped
    # If you change INKCACHE_PORT below, update the host:container mapping
    # to match — EXPOSE in the Dockerfile is just metadata, it doesn't
    # enforce anything, so the two can silently drift out of sync.
    ports:
      - "8080:8080"
    environment:
      INKCACHE_PORT: 8080
      INKCACHE_NODE_ID: node-1
      # INKCACHE_CORS_ORIGIN: https://your-dashboard.example.com
