name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install backend deps
        run: npm ci

      - name: Typecheck backend
        run: npx tsc --noEmit

      - name: Check formatting
        run: npm run format:check

      - name: Run core + API tests
        run: npm test

      - name: Install dashboard deps
        run: npm ci
        working-directory: src/dashboard

      - name: Lint dashboard
        run: npm run lint
        working-directory: src/dashboard

      - name: Build dashboard
        run: npm run build
        working-directory: src/dashboard

      - name: Build node Docker image
        run: docker build -t inkcache-node .
