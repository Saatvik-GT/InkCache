name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install backend deps
        run: npm ci

      - name: Typecheck backend
        run: npx tsc --noEmit

      - name: Check formatting
        run: npm run format:check

      - name: Run core + API tests
        run: npm test

      - name: Install dashboard deps
        run: npm ci
        working-directory: src/dashboard

      - name: Lint dashboard
        run: npm run lint
        working-directory: src/dashboard

      - name: Build dashboard
        run: npm run build
        working-directory: src/dashboard

      - name: Build node Docker image
        run: docker build -t inkcache-node .

      - name: Smoke-test the Docker image
        run: |
          docker run -d --name inkcache-smoke -p 8080:8080 inkcache-node
          for i in $(seq 1 10); do
            if curl -sf http://localhost:8080/health; then break; fi
            [ "$i" -eq 10 ] && { echo "node never came up"; docker logs inkcache-smoke; exit 1; }
            sleep 1
          done

      # Runs even if the smoke test above failed (if: always()) — a failed
      # health check would otherwise leave the container running for the
      # rest of the job instead of exiting cleanly.
      - name: Stop the smoke-test container
        if: always()
        run: docker rm -f inkcache-smoke
